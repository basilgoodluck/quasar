server {
    listen 80;
    server_name quasar.basilgoodluck.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name quasar.basilgoodluck.com;

    ssl_certificate /etc/letsencrypt/live/quasar.basilgoodluck.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quasar.basilgoodluck.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:7052;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}