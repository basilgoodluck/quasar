name: Notifications

on:
  workflow_call:
    inputs:
      event:
        required: true
        type: string
      message:
        required: true
        type: string
      level:
        required: false
        type: string
        default: info

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram alert
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="[${{ inputs.level }}] ${{ inputs.event }}: ${{ inputs.message }}"

      - name: Send Discord alert
        run: |
          curl -s -X POST ${{ secrets.DISCORD_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"[${{ inputs.level }}] **${{ inputs.event }}**: ${{ inputs.message }}\"}"