name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install ruff
      - run: ruff check .

  test:
    needs: lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: quasar
          POSTGRES_PASSWORD: quasar
          POSTGRES_DB: quasar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONPATH: /home/runner/work/quasar/quasar
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: quasar
      POSTGRES_PASSWORD: quasar
      POSTGRES_DB: quasar_test
      SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
      AGENT_ID: "0"
      AGENT_WALLET_ADDRESS: "0xf39Fd6e51aad88F6F4ce6aB8827279cffFb92266"
      AGENT_WALLET_PRIVATE_KEY: "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"
      RISK_ROUTER_ADDRESS: "0x0000000000000000000000000000000000000001"
      HACKATHON_VAULT_ADDRESS: "0x0000000000000000000000000000000000000002"
      VALIDATION_REGISTRY_ADDRESS: "0x0000000000000000000000000000000000000003"
      AGENT_REGISTRY_ADDRESS: "0x0000000000000000000000000000000000000004"
      CHAIN_ID: "11155111"
      KRAKEN_API_KEY: mock
      KRAKEN_API_SECRET: mock
      KRAKEN_PAPER_MODE: "true"
      OPENAI_API_KEY: mock

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Kraken CLI
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/krakenfx/kraken-cli/releases/latest/download/kraken-cli-installer.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Apply schema
        run: psql postgresql://quasar:quasar@localhost:5432/quasar_test -f database/schema.sql

      # - name: Run tests
      #   run: pytest tests/ -v
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push base
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-base:latest

      - name: Build and push agent
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          file: ./agent/Dockerfile
          push: true
          build-args: DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-agent:latest

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          build-args: DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-backend:latest

      - name: Build and push collector
        uses: docker/build-push-action@v5
        with:
          context: ./collector
          file: ./collector/Dockerfile
          push: true
          build-args: DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-collector:latest

      - name: Build and push outcome_tracker
        uses: docker/build-push-action@v5
        with:
          context: ./outcome_tracker
          file: ./outcome_tracker/Dockerfile
          push: true
          build-args: DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-outcome-tracker:latest

      - name: Build and push trainer
        uses: docker/build-push-action@v5
        with:
          context: ./trainer
          file: ./trainer/Dockerfile
          push: true
          build-args: DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-trainer:latest