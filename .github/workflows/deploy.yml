name: Deploy

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.base
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-base:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-base:latest
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-base:latest,mode=max

      - name: Build and push agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./agent/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-agent:latest
          cache-from: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-base:latest
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-agent:latest
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-agent:latest,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-backend:latest
          cache-from: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-base:latest
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-backend:latest
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-backend:latest,mode=max

      - name: Build and push collector image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./collector/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-collector:latest
          cache-from: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-base:latest
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-collector:latest
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-collector:latest,mode=max

      - name: Build and push trainer image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./trainer/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-trainer:latest
          cache-from: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-base:latest
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-trainer:latest
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-trainer:latest,mode=max

      - name: Build and push outcome_tracker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./outcome_tracker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/quasar-outcome-tracker:latest
          cache-from: |
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-base:latest
            type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-outcome-tracker:latest
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/quasar-outcome-tracker:latest,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          command_timeout: 40m
          script: |
            set -e
            cd /opt/projects/quasar
            git fetch origin
            git reset --hard origin/main
            echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
            docker compose pull --parallel
            docker compose up -d
          envs: DOCKER_USERNAME,DOCKER_PASSWORD
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}