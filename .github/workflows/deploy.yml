name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push agent image
        uses: docker/build-push-action@v5
        with:
          context: ./agent
          push: true
          tags: quasar/agent:${{ github.sha }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: quasar/dashboard:${{ github.sha }}

      - name: Deploy to production
        run: |
          ssh ${{ secrets.DEPLOY_HOST }} "
            docker pull quasar/agent:${{ github.sha }} &&
            docker pull quasar/dashboard:${{ github.sha }} &&
            docker compose up -d --no-deps agent dashboard
          "