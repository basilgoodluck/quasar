name: Test Agent Logic

on:
  push:
  pull_request:

jobs:
  test-agent:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run regime detection tests
        run: pytest tests/agent/test_regime.py -v

      - name: Run signal generation tests
        run: pytest tests/agent/test_signals.py -v

      - name: Run risk rules tests
        run: pytest tests/agent/test_risk.py -v

      - name: Run trade decision engine tests
        run: pytest tests/agent/test_decision.py -v