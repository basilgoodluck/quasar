name: Test Execution Wrapper

on:
  push:
  pull_request:

jobs:
  test-execution:
    runs-on: ubuntu-latest

    env:
      KRAKEN_API_KEY: mock
      KRAKEN_API_SECRET: mock

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run execution tests
        run: pytest tests/execution/ -v --mock-kraken