name: Replay Test

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  replay:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: quasar
          POSTGRES_PASSWORD: quasar
          POSTGRES_DB: quasar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://quasar:quasar@localhost:5432/quasar_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run replay tests
        run: pytest tests/replay/ -v --sample-size=20