services:

  postgres:
    image: postgres:15
    container_name: quasar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - quasar-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    image: quasar-collector:latest
    container_name: quasar-collector
    restart: unless-stopped
    build:
      context: .
      dockerfile: agent/Dockerfile
    command: python agent/collect.py
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quasar-net

  agent:
    image: quasar-agent:latest
    container_name: quasar-agent
    restart: unless-stopped
    build:
      context: .
      dockerfile: agent/Dockerfile
    command: python main.py
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      collector:
        condition: service_started
    networks:
      - quasar-net

  outcome_tracker:
    image: quasar-outcome-tracker:latest
    container_name: quasar-outcome-tracker
    restart: unless-stopped
    build:
      context: .
      dockerfile: agent/Dockerfile
    command: python agent/outcome_tracker.py
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_started
    networks:
      - quasar-net

  trainer:
    image: quasar-trainer:latest
    container_name: quasar-trainer
    restart: "no"
    build:
      context: .
      dockerfile: agent/Dockerfile
    command: python agent/train.py
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quasar-net

  backend:
    image: quasar-backend:latest
    container_name: quasar-backend
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quasar-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: quasar-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quasar-net

  redis:
    image: redis:7-alpine
    container_name: quasar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - quasar-net

networks:
  quasar-net:
    driver: bridge

volumes:
  postgres_data: