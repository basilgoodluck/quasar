services:

  postgres:
    image: postgres:15
    container_name: quasar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - quasar-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    image: noblebasil/quasar-collector:latest
    container_name: quasar-collector
    restart: unless-stopped
    build:
      context: .
      dockerfile: collector/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quasar-net

  trainer:
    image: noblebasil/quasar-trainer:latest
    container_name: quasar-trainer
    restart: "no"
    build:
      context: .
      dockerfile: trainer/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quasar-net
    volumes:
      - models_data:/app/models

  outcome_tracker:
    image: noblebasil/quasar-outcome-tracker:latest
    container_name: quasar-outcome-tracker
    restart: unless-stopped
    build:
      context: .
      dockerfile: outcome_tracker/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quasar-net
    volumes:
      - models_data:/app/models

  agent:
    image: noblebasil/quasar-agent:latest
    container_name: quasar-agent
    restart: unless-stopped
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quasar-net
    volumes:
      - models_data:/app/models

  backend:
    image: noblebasil/quasar-backend:latest
    container_name: quasar-backend
    restart: unless-stopped
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quasar-net
    volumes:
      - models_data:/app/models

  redis:
    image: redis:7-alpine
    container_name: quasar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - quasar-net

networks:
  quasar-net:
    driver: bridge

volumes:
  postgres_data:
  models_data: